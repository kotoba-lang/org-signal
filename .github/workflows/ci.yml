name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        run: clojure -M:test

  cljs-test:
    name: shadow-cljs :node-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-cljs-clj-

      - name: Install npm deps
        run: npm install --no-save @noble/curves shadow-cljs

      - name: Compile + run CLJS tests
        run: npx shadow-cljs compile test && node out/node-tests.js
